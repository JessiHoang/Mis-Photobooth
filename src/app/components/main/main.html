<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi's Photobooth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col bg-white">

  <!-- Header -->
  <header>
    <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-center">
      <img src="/img/logoMipink.png" alt="Mi's Photobooth LOGO" class="h-16 sm:h-20 md:h-24 object-contain" />
    </nav>
  </header>

  <!-- Main -->
  <main class="flex-1 flex flex-col items-center justify-center px-4">

    <div
      class="w-full max-w-[95%] sm:max-w-[92%] md:max-w-[88%] lg:max-w-4xl aspect-video rounded-xl overflow-hidden bg-black border border-gray-700">
      <video #video autoplay playsinline class="w-full h-full object-contain"></video>
    </div>

    <!-- Buttons -->
    <div class="mt-6 flex gap-4 items-center">
      <button (click)="startCamera()"
        class="px-6 py-2 bg-white border border-gray-300 text-black rounded-lg hover:bg-gray-100 transition">
        Start
      </button>

      <button (click)="openGallery()" class="text-2xl p-2 rounded-lg hover:bg-gray-100 transition">
        🖼️
      </button>
    </div>

    <hr class="w-full max-w-5xl my-8">

    <!-- Info Text -->
    <section class="w-full max-w-5xl">
      <div class="text-sm mb-4 text-center space-y-2">

        <h2 class="text-xl font-semibold mb-2">
          Your Photo Stripes
        </h2>

        <ul class="list-none space-y-1 text-gray-700">
          <li>4 Shots</li>
          <li>5 Sec</li>
          <li>6 Different Designs</li>
        </ul>

        <div class="text-xl font-semibold mt-4">+</div>

        <h2 class="text-lg font-semibold mt-2">
          Your Personal Gallery
        </h2>

        <ul class="list-none space-y-1 text-gray-700">
          <li> save your memories</li>
        </ul>

      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-200 py-6 flex justify-center">
    <p>Copyright © 2026 Mi Hoang</p>
  </footer>

</body>

</html>
