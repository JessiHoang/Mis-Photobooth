<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header>
    <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-center">
      <img
        src="/img/logoMipink.png"
        alt="Mi's Photobooth LOGO"
        class="h-16 sm:h-20 md:h-24 object-contain"
      />
    </nav>
  </header>

  <!-- Main -->
  <main class="flex flex-1 justify-center items-center px-4">

    <form class="w-full max-w-md bg-pink-50 border border-pink-200 rounded-xl px-6 py-6">

      <!-- Title -->
      <h3 class="flex justify-center text-lg sm:text-xl font-semibold">
        3.. 2.. 1.. CHEESE!
      </h3>

      <p class="flex justify-center py-2 text-sm sm:text-base text-center">
        take cute photos and create new memories:)
      </p>

      <!-- Email -->
      <div class="mb-4">
        <label for="email" class="block mb-1 text-sm sm:text-base">
          E-Mail:
        </label>

        <input
          type="text"
          name="email"
          id="email"
          required
          class="w-full border border-pink-200 rounded-xl px-4 py-2 text-sm sm:text-base focus:ring-1 focus:ring-pink-400 outline-none"
        >
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label for="password" class="block mb-1 text-sm sm:text-base">
          Password:
        </label>

        <input
          type="password"
          name="password"
          id="password"
          required
          class="w-full border border-pink-200 rounded-xl px-4 py-2 text-sm sm:text-base focus:ring-1 focus:ring-pink-400 outline-none"
        >
      </div>

      <!-- Buttons -->
      <div class="flex flex-col sm:flex-row justify-center items-center gap-4">

        <button
          type="submit"
          class="w-full sm:w-auto bg-[#ffa2c6] text-white hover:bg-pink-100 hover:text-pink-300 font-semibold py-3 px-6 rounded-xl transition text-sm sm:text-base"
        >
          sign in
        </button>

        <a
          href="/src/app/components/signup/signup.html"
          class="text-[#ffa2c6] underline text-sm sm:text-base"
        >
          sign up now!
        </a>

      </div>

    </form>

  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-200 py-6 flex justify-center">
    <p>Copyright © 2026 Mi Hoang</p>
  </footer>

</body>
</html>
