<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col">
    <header>
        <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-center">
            <img 
            src="/img/logoMipink.png" 
            alt="Mi's Photobooth LOGO"
            class="h-16 sm:h-20 md:h-24 object-contain"/>
        </nav>
    </header>
    <main class=" flex justify-center">
        <form class="bg-pink-50 border border-pink-200 rounded- px-6 py-4">
            <h3 class=" flex justify-center"> 3.. 2.. 1.. CHEESE!</h3>
            <p class=" flex justify-center py-2"> welcome to your personal photobooth :)</p>
            <div>
                <label 
                    for="email"> 
                    E-Mail:
                </label>
                        <input
                        type="text" 
                        name="email" 
                        id="email" 
                        required 
                        class="border border-pink-200 rounded-xl px-5 text-sm sm:text-base focus:ring-1 focus:ring-pink-400 outline-none"> 
            </div>
            <br>
            <div>
                <label 
                for="password"> 
                    Password: 
                    <input 
                    type="password" 
                    name="password" 
                    id="password" 
                    required 
                    class="border border-pink-200 rounded-xl px-4 text-sm sm:text-base focus:ring-1 focus:ring-pink-400 outline-none"> 
                </label>
            </div>
            <br>
            <div class="flex justify-center item-center gap-6">
                <button 
                    type="submit"
                    class="bg-[#ffa2c6] text-white hover:bg-pink-100 hover:text-pink-300 font-semibold py-3 px-4 rounded-xl transition text-sm sm:text-base">
                    sign in 
                </button>        
                <p> 
                    <a href="/src/app/components/signup/signup.html"
                        class=" text-[#ffa2c6] underline text-sm sm:text-base leading-none h-full flex items-center mb-3"> 
                        sign up now! 
                    </a>
                </p>
            </div>
        </form>
    </main>
    <footer class="border-t border-gray-200 mt-10 pt-6 flex justify-center">
        <p class=""> Copyright © 2026 Mi Hoang </p> 
    </footer>
   
</body>
</html>
